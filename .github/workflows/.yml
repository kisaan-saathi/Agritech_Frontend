name: Next.js CI

on:
  push:
    branches: ["main"]

jobs:
  build_production:
    runs-on: self-hosted

    strategy:
      matrix:
        node-version: [20.x]

    if: github.ref == 'refs/heads/main'

    steps:
      # 1️⃣ Checkout code
      - uses: actions/checkout@v3

      # 2️⃣ Setup Node.js
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}

      # 3️⃣ Copy repo code to frontend directory
      - name: Copy code to frontend directory
        run: |
          cd
          sudo cp -r /var/www/actions-runner/_work/Agritech_Frontend/Agritech_Frontend/* /var/www/Agritech_Frontend

      # 4️⃣ Install dependencies & build Next.js
      - name: Install & Build Next.js
        run: |
          npm install
          npm run build
        working-directory: /var/www/Agritech_Frontend

      # 5️⃣ Restart Next.js with PM2
      - name: Restart Next.js Server
        run: |
          pm2 restart Agritech_Frontend || pm2 start npm --name Agritech_Frontend -- start
