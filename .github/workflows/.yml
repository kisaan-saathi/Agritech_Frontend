name: Next.js Deploy (Build from Local)

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      # 1️⃣ Checkout latest code (includes .next)
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Sync project to live directory
      - name: Sync files to /var/www/Agritech_Frontend
        run: |
          rsync -av --delete \
          --exclude=node_modules \
          --exclude=.git \
          ./ /var/www/Agritech_Frontend/

      # 3️⃣ Restart PM2 with updated build
      - name: Restart Next.js app
        run: |
          pm2 restart Agritech_Frontend --update-env || \
          pm2 start npm --name Agritech_Frontend -- start
