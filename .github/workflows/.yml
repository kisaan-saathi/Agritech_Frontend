name: Next.js CI/CD

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: self-hosted

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      # 1️⃣ Checkout repo (inside runner workspace)
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: npm install

      # 4️⃣ Build Next.js
      - name: Build Next.js
        run: npm run build

      # 5️⃣ Deploy build to /var/www
      - name: Deploy to server directory
        run: |
          rsync -av --delete \
          --exclude=node_modules \
          --exclude=.git \
          ./ /var/www/Agritech_Frontend/

      # 6️⃣ Restart PM2
      - name: Restart Next.js App
        run: |
          pm2 restart Agritech_Frontend --update-env || \
          pm2 start npm --name Agritech_Frontend -- start
